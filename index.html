<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مالسمينت | Malcement</title>
  <meta name="description" content="مالسمينت لتجارة مواد البناء والإسمنت - روابط التواصل، العنوان، وأرقام الهاتف." />

  <style>
    * { box-sizing: border-box; }

    :root {
      --green-dark: #062d24;
      --green-deep: #041f19;
      --gold: #d5a331;
      --gold-light: #f5d56f;
      --text: #ffffff;
      --muted: #d9e2dc;
      --line: rgba(245, 213, 111, 0.26);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(245, 213, 111, 0.18), transparent 32%),
        linear-gradient(145deg, var(--green-dark), var(--green-deep));
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 28px 16px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      text-align: center;
      padding: 24px 18px 20px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(4, 31, 25, 0.74);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.32);
    }

    .logo-wrap {
      width: 170px;
      height: 170px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .logo {
      width: 155px;
      max-height: 155px;
      object-fit: contain;
      display: block;
    }

    h1 {
      margin: 8px 0 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 800;
    }

    h1 span {
      display: block;
      direction: ltr;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .tagline {
      margin: 8px 0 20px;
      color: var(--muted);
      font-size: 15px;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .link {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      border-radius: 17px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.055);
    }

    .link:hover {
      border-color: rgba(245, 213, 111, 0.7);
      background: rgba(255, 255, 255, 0.09);
    }

    .link.primary {
      color: #102019;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border-color: transparent;
      box-shadow: 0 10px 28px rgba(213, 163, 49, 0.23);
    }

    .icon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.12);
    }

    .primary .icon {
      background: rgba(6, 45, 36, 0.14);
    }

    .info {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .info-item {
      display: grid;
      gap: 4px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-size: 14px;
    }

    .info-label {
      color: var(--gold-light);
      font-weight: 800;
      font-size: 13px;
    }

    .info a {
      color: var(--muted);
      text-decoration: none;
      direction: ltr;
    }

    @media (max-width: 370px) {
      .card { padding: 20px 14px 16px; border-radius: 22px; }
      .logo-wrap { width: 145px; height: 145px; }
      .logo { width: 132px; max-height: 132px; }
      .link { font-size: 15px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="logo-wrap">
        <img src="malcement-logo.png" alt="Malcement logo" class="logo" />
      </div>

      <h1>مالسمينت <span>Malcement</span></h1>
      <p class="tagline">لتجارة مواد البناء والإسمنت</p>

      <div class="links">

        <a class="link" href="https://www.facebook.com/profile.php?id=61575426830763" target="_blank" rel="noopener">
          <span class="icon">f</span>
          <span>Facebook</span>
        </a>

        <a class="link" href="https://www.instagram.com/malcement/" target="_blank" rel="noopener">
          <span class="icon">◎</span>
          <span>Instagram</span>
        </a>

        <a class="link" href="https://www.tiktok.com/@malcement?_r=1&_t=ZS-97BODCibkOd" target="_blank" rel="noopener">
          <span class="icon">♪</span>
          <span>TikTok</span>
        </a>
      </div>

      <div class="info">
        <div class="info-item">
          <span class="info-label">العنوان</span>
          <span>بيت لحم - الخضر - دوار البالوع - طلعة قصقص</span>
        </div>

        <div class="info-item">
          <span class="info-label">الهاتف</span>
          <span dir="ltr">0568571439</span>
        </div>

        <div class="info-item">
          <span class="info-label">البريد الإلكتروني</span>
          <a href="mailto:malcement.ltd@gmail.com">malcement.ltd@gmail.com</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
